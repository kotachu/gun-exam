<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="銃砲考査">
<meta name="theme-color" content="#1a5c2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>猟銃等講習会 考査対策</title>
<style>
:root {
  --primary: #1a5c2e;
  --primary-light: #2d8a4e;
  --correct: #16a34a;
  --correct-bg: #dcfce7;
  --wrong: #dc2626;
  --wrong-bg: #fef2f2;
  --bg: #f8f9fa;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-sub: #6b7280;
  --border: #e5e7eb;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  text-align: center;
  padding: 24px 0 16px;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-size: 13px;
  color: var(--text-sub);
  margin-top: 4px;
}

/* Menu Screen */
.menu-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 16px;
}
.menu-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.menu-btn:active { transform: scale(0.98); box-shadow: none; }
.menu-btn .badge {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  background: var(--bg);
  padding: 4px 10px;
  border-radius: 20px;
}
.menu-btn .arrow { color: var(--text-sub); font-size: 18px; }
.menu-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 20px;
  margin-bottom: -4px;
  padding-left: 4px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.stat-card {
  flex: 1;
  min-width: 80px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .num { font-size: 22px; font-weight: 700; color: var(--primary); }
.stat-card .label { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

/* Quiz Screen */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 16px;
}
.back-btn {
  background: none;
  border: none;
  font-size: 16px;
  color: var(--primary);
  cursor: pointer;
  padding: 8px;
  margin: -8px;
  -webkit-tap-highlight-color: transparent;
}
.progress-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
}
.score-text {
  font-size: 14px;
  font-weight: 600;
}
.score-text .correct-count { color: var(--correct); }
.score-text .wrong-count { color: var(--wrong); }

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 20px;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.3s ease;
}

.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  flex: 1;
  display: flex;
  flex-direction: column;
}
.question-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.question-meta .tag {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  background: #e0f2fe;
  color: #0369a1;
}
.question-text {
  font-size: 17px;
  line-height: 1.7;
  font-weight: 500;
  flex: 1;
}

.answer-buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.answer-btn {
  flex: 1;
  padding: 18px;
  border-radius: 14px;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  border: 3px solid;
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.answer-btn:active { transform: scale(0.96); }
.btn-maru {
  background: #f0fdf4;
  border-color: var(--correct);
  color: var(--correct);
}
.btn-batsu {
  background: #fef2f2;
  border-color: var(--wrong);
  color: var(--wrong);
}
.answer-btn.disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* Result feedback */
.feedback {
  margin-top: 16px;
  padding: 16px;
  border-radius: 12px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback.correct {
  background: var(--correct-bg);
  border: 1px solid #bbf7d0;
}
.feedback.wrong {
  background: var(--wrong-bg);
  border: 1px solid #fecaca;
}
.feedback-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}
.feedback.correct .feedback-title { color: var(--correct); }
.feedback.wrong .feedback-title { color: var(--wrong); }
.feedback-answer {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}
.feedback-explanation {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.feedback-refs {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.5;
}

.next-btn {
  margin-top: 16px;
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.next-btn:active { background: var(--primary-light); }

/* Result Screen */
.result-screen {
  text-align: center;
  padding: 40px 0;
}
.result-score {
  font-size: 64px;
  font-weight: 800;
  color: var(--primary);
}
.result-score .unit { font-size: 24px; }
.result-label {
  font-size: 16px;
  color: var(--text-sub);
  margin-top: 4px;
}
.result-detail {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
}
.result-detail .item { text-align: center; }
.result-detail .num { font-size: 28px; font-weight: 700; }
.result-detail .num.green { color: var(--correct); }
.result-detail .num.red { color: var(--wrong); }
.result-detail .lbl { font-size: 12px; color: var(--text-sub); }
.result-actions {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.result-actions button {
  padding: 16px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border: none;
}
.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: var(--card); color: var(--primary); border: 2px solid var(--primary) !important; }

/* Wrong only review */
.wrong-review-list {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.wrong-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: left;
  box-shadow: var(--shadow);
}
.wrong-item .q-text {
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 8px;
}
.wrong-item .correct-answer {
  font-size: 14px;
  font-weight: 600;
  color: var(--correct);
  margin-bottom: 6px;
}
.wrong-item .expl {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.5;
}

.hidden { display: none !important; }

/* Shuffle/mode toggles */
.mode-options {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.mode-toggle {
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-sub);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.mode-toggle.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Menu Screen -->
  <div id="menuScreen">
    <div class="header">
      <h1>猟銃等講習会 考査対策</h1>
      <div class="subtitle">初心者講習 予想模試 250問</div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="mode-options">
      <button class="mode-toggle active" id="toggleShuffle" onclick="toggleShuffle()">シャッフル</button>
      <button class="mode-toggle" id="toggleWrongOnly" onclick="toggleWrongOnly()">間違えた問題のみ</button>
    </div>

    <div class="menu-section-title">模試を選択</div>
    <div class="menu-grid">
      <button class="menu-btn" onclick="startQuiz(0)">
        <span>全問チャレンジ</span>
        <span class="badge">250問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz(1)">
        <span>予想模試 第1回</span>
        <span class="badge">50問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz(2)">
        <span>予想模試 第2回</span>
        <span class="badge">50問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz(3)">
        <span>予想模試 第3回</span>
        <span class="badge">50問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz(4)">
        <span>予想模試 第4回</span>
        <span class="badge">50問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz(5)">
        <span>予想模試 第5回</span>
        <span class="badge">50問</span>
      </button>
    </div>

    <div class="menu-section-title" style="margin-top:24px">データ管理</div>
    <div class="menu-grid">
      <button class="menu-btn" onclick="resetProgress()" style="color:var(--wrong)">
        <span>学習記録をリセット</span>
        <span class="arrow">&rsaquo;</span>
      </button>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="hidden">
    <div class="quiz-header">
      <button class="back-btn" onclick="backToMenu()">&larr; 戻る</button>
      <span class="progress-text" id="progressText"></span>
      <span class="score-text">
        <span class="correct-count" id="correctCount">0</span>
        /
        <span class="wrong-count" id="wrongCount">0</span>
      </span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="question-card">
      <div class="question-meta" id="questionMeta"></div>
      <div class="question-text" id="questionText"></div>

      <div class="answer-buttons" id="answerButtons">
        <button class="answer-btn btn-maru" onclick="submitAnswer(true)">&#9675;</button>
        <button class="answer-btn btn-batsu" onclick="submitAnswer(false)">&#10005;</button>
      </div>

      <div class="feedback hidden" id="feedback">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-answer" id="feedbackAnswer"></div>
        <div class="feedback-explanation" id="feedbackExplanation"></div>
        <div class="feedback-refs" id="feedbackRefs"></div>
      </div>
    </div>

    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <!-- Result Screen -->
  <div id="resultScreen" class="hidden">
    <div class="header">
      <h1>結果発表</h1>
    </div>
    <div class="result-screen">
      <div class="result-score" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <div class="result-detail">
        <div class="item">
          <div class="num green" id="resultCorrect">0</div>
          <div class="lbl">正解</div>
        </div>
        <div class="item">
          <div class="num red" id="resultWrong">0</div>
          <div class="lbl">不正解</div>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" onclick="retryWrong()" id="retryWrongBtn">間違えた問題をやり直す</button>
        <button class="btn-secondary" onclick="backToMenu()">メニューに戻る</button>
      </div>
    </div>
    <div class="wrong-review-list" id="wrongReviewList"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"id":1,"set":1,"question":"猟銃による事故を防止するためには、銃の構造等の知識に加え、使用する実包等火薬類に関する基本的な知識を習得する必要がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃用火薬類等に関する法令","§1 火薬の分類と用途"]},{"id":2,"set":1,"question":"事故防止のためには、疲れを感じたら狩猟を中止し、疲労を回復してから狩猟を再開するような配慮が必要である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","第3章 実包の運搬及び保管についての一般事例","§2 火薬類の保管"]},{"id":3,"set":1,"question":"猟銃用火薬類の消費の許可を受けるには、住所地を管轄する警察署に申請書を提出する必要がある。","answer":false,"explanation":"猟銃用火薬類の消費許可を申請するのは、住所地を管轄する警察署ではなく、消費地を管轄する警察署です。たとえば、クレー射撃の大会に出るために消費許可を受ける場合、その大会が開かれる射撃場を管轄する警察署に申請を出します。","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃用火薬類等に関する法令"]},{"id":4,"set":1,"question":"狩猟の用途のために所持許可を受けた銃を違法な狩猟をするために携帯することはできない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 銃についての法令全般"]},{"id":5,"set":1,"question":"空気銃の所持許可を受けることができる人は18歳以上でなければならないが、日本スポーツ協会から推薦された者は14歳から所持許可を受けることができる。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§1 所持許可制度の概要"]},{"id":6,"set":1,"question":"射撃場では、銃に弾を装填してから射台に立ち、準備ができたことの合図を送る。","answer":false,"explanation":"射撃場では、まず射台に立って発射の準備ができた後で、銃に弾を装填します。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","第3章 猟銃・空気銃の基本的取扱い"]},{"id":7,"set":1,"question":"弾丸の「最大到達距離」はあくまでも目安であり、風向きによってはさらに遠くまで到達する。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃についての基礎知識","§4 銃の威力と危険範囲"]},{"id":8,"set":1,"question":"散弾は号数によって粒の数が決められている。たとえば、12号の散弾は12粒、30号の散弾は30粒の弾が薬莢の中に入っていることを意味する。","answer":false,"explanation":"散弾は「粒の大きさ」で号数が決まっています。たとえば、クレー射撃でよく使われる「7半号」と呼ばれる散弾は、1粒の弾の直径が約2.41mm、「9号」は約2.0mmです。何発の弾が入っているかは重量であらわされ、たとえば「9号24グラム」の弾は、9号の散弾が24グラム入っています。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃についての基礎知識","§4 銃の威力と危険範囲"]},{"id":9,"set":1,"question":"猟銃や空気銃の所持許可が失効した場合には、50日以内にあらためて所持許可を受けるか、その猟銃や空気銃を譲渡又は廃棄するなどの措置をとらなければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§1 所持許可の失効とその他の手続き"]},{"id":10,"set":1,"question":"都道府県公安委員会は、猟銃や空気銃、実包等を保管している者に対して、保管の状況について必要な報告を求めることができるが、しかし、警察職員が実際に保管場所に立ち入るようなことはできない。","answer":false,"explanation":"警察職員は保管状況を確認するために、立ち入り検査ができます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":11,"set":1,"question":"実包は、装薬が多ければ多いほど威力が強くなるので、自分で実包を製造する際は、装薬を多めに入れたほうがよい。","answer":false,"explanation":"実包に使われる装薬の量は、使用する装弾の重量や薬莢の種類などで決まっています。メーカーが指定する基準に従って、その範囲から逸脱しないように充填しましょう。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3章 実包の運搬及び保管についての一般事例","§2 火薬類の保管"]},{"id":12,"set":1,"question":"射撃に関しては、法律で定められた決まり以外にも、ルールやマナーも大事である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","§1 猟銃・空気銃の基本的取扱い"]},{"id":13,"set":1,"question":"散弾銃から発射された散弾は、獲物に命中した一部の弾以外は「流れ弾」となる。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例"]},{"id":14,"set":1,"question":"たとえ親しい友人や、狩猟・射撃の大先輩でも、自身の銃を貸したり運搬させたりすることは違法である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第5章 猟銃・空気銃の保管の一般事例"]},{"id":15,"set":1,"question":"狩猟免許には、銃猟免許、わな猟免許、網猟免許の3つの種類がある。猟銃や空気銃を用いて狩猟をする場合は銃猟免許を受ける必要がある。","answer":false,"explanation":"狩猟免許は第一種銃猟免許、第二種銃猟免許、わな猟免許、網猟免許の4つの種類です。猟銃は第一種銃猟免許、空気銃は第二種（第一種でも可）を受けなければなりません。","references":["第1編 猟銃及び空気銃の所持に関する法令","§7 猟銃免許と狩猟者登録"]},{"id":16,"set":1,"question":"引き金の遊びとは「ガタつき」のことであり、不良個所といえるので、すみやかに銃砲店で修理してもらう必要がある。","answer":false,"explanation":"引き金の「遊び」（テイクアップ）は引き金が引かれて逆鈎が作動するまでの余裕です。この遊びが小さすぎると、暴発を起こす危険性が高まります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃の種類等","§3 撃発機構及び安全装置"]},{"id":17,"set":1,"question":"引き金を引いて撃鉄が落ちてもすぐに弾丸が発射されず、やや時間がおいてから発射されることを不発という。","answer":false,"explanation":"弾丸が遅れて発射する現象は「遅発」と呼ばれています。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","§1 猟銃・空気銃の基本的取扱い"]},{"id":18,"set":1,"question":"「射撃技能の維持向上」は努力義務なので、これに違反したとしても都道府県公安委員会から指示処分を受けることはない。","answer":false,"explanation":"射撃技能の維持向上は努力義務ですが、状況によっては公安委員会から射撃の練習を行うように指示が下ることがあります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§1 猟銃・空気銃の基本的取扱い"]},{"id":19,"set":1,"question":"暴発事故のほとんどは、小まめに脱包を確認することで防ぐことができる。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","§1 猟銃・空気銃の基本的取扱い"]},{"id":20,"set":1,"question":"狩猟で実包を消費した場合は、帳簿に消費した数だけを記載すればよい。","answer":false,"explanation":"狩猟で実包を消費した場合は、帳簿に消費した数だけでなく、「どこで消費したか」も記載する必要があります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃用火薬類等に関する法令"]},{"id":21,"set":1,"question":"猟銃や空気銃による射撃を行う前に、銃を安全に発射できる発射方向の範囲を事前に確認しておく必要がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","§1 猟銃・空気銃の基本的取扱い"]},{"id":22,"set":1,"question":"猟銃や空気銃の所持許可の更新を受けようとする者は、経験者講習会を受けて、その講習を修了しなければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§6 所持許可の更新とその手続き"]},{"id":23,"set":1,"question":"同居人に銃の所持許可を受けている者がいる場合は、例外としてその者に保管を任せることができる。","answer":false,"explanation":"銃の保管は、所持許可を受けた本人が管理しなければなりません。たとえ同居の親族に銃の所持許可を受けている人がいても、保管を任せることはできません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":24,"set":1,"question":"実包を装填した後は、必ず開閉レバーの位置などにより薬室が完全に閉鎖されているかを確認しなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","§1 猟銃・空気銃の基本的取扱い"]},{"id":25,"set":1,"question":"銃又は実包は、ガンケースと装弾ケースといった具合に、容器を分けて運搬する必要がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3章 実包の運搬及び保管についての一般事例","§5 使用前の注意事項"]},{"id":26,"set":1,"question":"先台が確実に装着されていなかったり、ゆるみがあると、銃を発射したときに先台が外れ、事故の発生につながる。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3章 猟銃・空気銃の使用、保管等についての事例","§5 使用前の注意事項"]},{"id":27,"set":1,"question":"猟銃又は空気銃の所持者は、銃をなくしたり盗まれたりしたときは、直ちに警察署に届け出なければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令"]},{"id":28,"set":1,"question":"実包の保管数や消費数など虚偽の記載をすると、刑事罰を受ける場合がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃用火薬類等に関する法令"]},{"id":29,"set":1,"question":"猟銃や空気銃の事故で最も多いのは、銃身や機関部の破損によって射手自身が怪我をする自損事故である。","answer":false,"explanation":"猟銃や空気銃の事故のほとんどは、誤射や暴発による死傷事故です。このような事故は、銃口の向きに注意をしていれば防止できます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 猟銃・空気銃の使用、保管等の取扱い"]},{"id":30,"set":1,"question":"災害による交通途絶のため猟銃の所持許可の更新ができなかった人で3年以内の技能講習修了証明書を所持する人は、交通復旧後3ヶ月以内であれば、射撃教習を受講することなく、猟銃の所持許可を受けることができる。","answer":false,"explanation":"災害により交通が途絶していたため更新申請ができなかった人は、例外として有効期間が残っている技能講習修了証明書を使って、すぐに所持許可を受けることができます。ただしこれが認められるのは交通復旧後「1ヶ月以内」です。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令"]},{"id":31,"set":1,"question":"宿泊施設で銃を管理人などに預けておくときは、銃は施錠したケースに入れてシーツなどで巻いておくなどの配慮が必要になる。","answer":false,"explanation":"宿泊場所での銃の管理は、必ず自分自身で行わなければなりません。クローク（荷物預りサービス）などに預けることはできません。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3章 猟銃・空気銃の保管の一般事例"]},{"id":32,"set":1,"question":"所持許可を受ける前に銃を所持すると違法となるが、その銃の所持者が親族であり、遺品として譲り受ける場合はその限りではない。","answer":false,"explanation":"たとえ親族の遺品であったとしても、所持許可を受けていなければ所持することは禁止されています。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":33,"set":1,"question":"銃砲刀剣類所持等取締法や火薬類取締法に違反して罰金刑を受けた人は、その刑の執行が終わった日から起算して10年間、猟銃や空気銃の所持許可を受けることができない。","answer":false,"explanation":"銃刀法または火薬法で罰金刑に処せられた人は、その刑の執行が終わって「5年間」、所持許可を受けることができません。なお、上記の罪で「死刑、無期もしくは3年以上の拘禁刑」に処せられた場合、違法な行為をした日から起算して10年間、所持許可を受けることができません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":34,"set":1,"question":"所持許可を受けた猟銃や空気銃を廃棄した場合、その所持許可は取り消される。","answer":false,"explanation":"猟銃や空気銃を廃棄した（銃砲店に引き取ってもらった）場合、所持許可は「失効」します。取消ではありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","§7 所持許可の失効とその他の手続き"]},{"id":35,"set":1,"question":"銃砲刀剣類所持等取締法は、民間人がどのようなものであっても銃砲を所持することを禁止しており、例外は無い。","answer":false,"explanation":"機関銃や大砲といった銃砲を民間人が所持することは禁止されています。しかし、「猟銃・空気銃」に限っては都道府県公安委員会からの猟銃空気銃所持許可が認められれば、合法的に所持できます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§5 猟銃・空気銃所持の社会的責任"]},{"id":36,"set":1,"question":"銃の所持者は、日常生活のあらゆる場面で細心の注意を払う習慣を身につけておくべきである。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令"]},{"id":37,"set":1,"question":"猟銃の撃発機構は、引き金を引くと撃鉄（ハンマー）が作動し、逆鈎（シアー）が撃針を打撃し、さらに撃針が雷管を打撃させる。","answer":false,"explanation":"猟銃の撃発機構は、引き金を引く→引き金が逆鈎を作動させる→逆鈎と撃鉄の噛み合いが外れる→撃鉄が撃針を叩く→撃針が雷管を叩く、という流れで行われます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§3 撃発機構及び安全装置"]},{"id":38,"set":1,"question":"水平二連銃は、銃身が2本横に並べられている構造の銃である。","answer":true,"explanation":"","references":["第1章 銃の種類等","§1 銃の種類"]},{"id":39,"set":1,"question":"銃の安全装置は、振動、衝撃による暴発を防ぐ機構とはなっていない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§3 撃発機構及び安全装置"]},{"id":40,"set":1,"question":"たとえ周囲に人がいなくても、銃口の向く先には常に注意を払う必要がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 猟銃・空気銃の使用、保管等についての事例","§1 猟銃・空気銃の基本的取扱い"]},{"id":41,"set":1,"question":"銃とその銃に適合する実包を同じガンロッカー内で保管すると、罰金に処せられる場合がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":42,"set":1,"question":"狩猟者登録を受けた者は、猟銃用火薬類等を無許可譲受数量の範囲内で譲り受けて所持できる。","answer":true,"explanation":"","references":["第3編 猟銃用火薬類等に関する法令","第1編 猟銃及び空気銃の所持に関する法令","§3 猟銃用火薬類等の受渡基準"]},{"id":43,"set":1,"question":"空気銃は猟銃に比べて威力は低く、最大到達距離も短いため、たとえ人に命中しても死傷させるおそれはない。","answer":false,"explanation":"空気銃は猟銃に比べて威力は低いですが、人に命中すると皮膚を貫通して大ケガを負わせるほどの威力を持ちます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":44,"set":1,"question":"日本は、銃に対して厳しい規制が行われており、それが良好な治安を維持してきた大きな要因であると言われている。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 猟銃・空気銃所持の社会的責任","§1 日本で銃を所持するためには"]},{"id":45,"set":1,"question":"猟銃や空気銃は、所持許可を受けた者の同居親族であれば、例外として1丁の銃を共有できる。","answer":false,"explanation":"所持許可制度では、たとえ親族であっても共有することはできません（一銃一許可）。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":46,"set":1,"question":"実包を譲り渡したり譲り受けたりした場合、その種類と数量、年月日の3点を記載する。","answer":false,"explanation":"実包を譲り渡したり譲り受けたりした場合、帳簿には、種類と数量、年月日に加え、相手方の住所や氏名（銃砲店であれば銃砲店の名前）を記載します。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":47,"set":1,"question":"銃を保管する設備は、金属製ロッカー等堅固な設備でなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令"]},{"id":48,"set":1,"question":"猟銃や空気銃の所持者が銃砲刀剣類所持等取締法の命令や処分に違反した場合は、都道府県公安委員会からの所持許可は失効することがある。","answer":false,"explanation":"銃刀法違反により、銃の提出指示等を受けたにもかかわらず従わなかった場合は、所持許可が「取り消される」場合があります。失効ではありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令"]},{"id":49,"set":1,"question":"猟銃や空気銃の所持許可を受ける前に、教習射撃場に備え付けてある種々の形式の猟銃・空気銃で射撃練習を行うことができる。","answer":false,"explanation":"備え付けてある様々な種類の猟銃・空気銃で射撃ができるのは、教習射撃場ではなく「練習射撃場」の指定を受けた射撃場です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§2 使用前の注意事項"]},{"id":50,"set":1,"question":"銃身の長さが48.8cm以下の空気銃は、所持許可を受けることができない。","answer":false,"explanation":"猟銃は、銃身の長さが48.8cm以下の物は所持許可の対象になりません。しかし、空気銃の場合は銃身の長さに規定はありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 猟銃・空気銃の所持に関する法令","§3 所持許可制度の概要"]},{"id":1,"set":2,"question":"射撃をするため実包を装填した時は、薬室が完全に閉鎖されているかどうかを開閉レバーにより確認すること。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 第1章 銃の種類等","§3 撃発機構及び安全装置"]},{"id":2,"set":2,"question":"初めに標的射撃の用途で所持許可を受けた銃を「狩猟」の用途にも使いたい場合、一旦所持許可を抹消して、新たに所持許可を受け直さなければならない。","answer":false,"explanation":"所持許可に用途を追加したい場合は、許可証の「書き換え」を行います。所持許可を抹消して取り直す必要はありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":3,"set":2,"question":"猟銃又は空気銃をなくしたり盗まれたりしていないのに嘘の届け出を出した者は、罰金に処せられる場合がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":4,"set":2,"question":"猟銃や空気銃の弾道は、重さや形状、使用する火薬量や種類、空気圧によって変化する。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":5,"set":2,"question":"法の基準に従って保管している銃であっても、盗難の被害に遭う危険性がないとは言い切れない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§3 猟銃・空気銃の保管の一般事項"]},{"id":6,"set":2,"question":"災害や病気のために更新申請期間内に申請ができなかった人は、所持許可の有効期間が満了した後でも、その理由を明らかにした書類を添えて更新申請を行うことができる。","answer":false,"explanation":"たとえやむを得ない理由があったとしても、所持許可の有効期間が満了した後は失効するため、更新をすることはできません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令"]},{"id":7,"set":2,"question":"足場が悪い猟場では、銃を杖がわりに使用することが効果的である。","answer":false,"explanation":"銃を杖などの用途に使うことは、故障の原因になるため、絶対にしてはいけません。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§5 猟銃や空気銃の基本的取扱い"]},{"id":8,"set":2,"question":"銃とその銃に適合する実包等は同一の建物内に保管しないように努めなければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第4章 対凶に関する法令","§1"]},{"id":9,"set":2,"question":"銃猟を行う場合は、銃砲刀剣類所持等取締法だけでなく、鳥獣の保護及び管理並びに狩猟の適正化に関する法律の規定も遵守しなければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令"]},{"id":10,"set":2,"question":"散弾銃の弾倉を3発以上実包を装填できるように改造した場合、所持許可が失効することがある。","answer":false,"explanation":"銃の構造・機能の基準維持義務に違反した場合、所持許可が取り消される場合があります。失効ではありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":11,"set":2,"question":"銃砲刀剣類所持等取締法など関連する法律の知識を身につけることは、猟銃や空気銃を所持する者の基本である。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 銃砲・空気銃所持者の社会的責任","§2 銃の所持者の心得"]},{"id":12,"set":2,"question":"猟銃や空気銃は使用（発砲）をしないのであれば、コレクションを目的で所持できる。","answer":false,"explanation":"猟銃や空気銃は「狩猟」、「標的射撃」、「有害鳥獣駆除」のいずれかの目的でしか所持できません。「コレクション」の目的はこれらに含まれません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":13,"set":2,"question":"猟銃や空気銃の所持者は、有効射程内はもちろんのこと、最大到達距離までの範囲は危険距離であることを認識しなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":14,"set":2,"question":"高温多湿な環境は、手詰め用の火薬や銃用雷管の劣化を早めてしまう。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","実包の運搬及び保管についての一般事項","§5 火薬類の保管"]},{"id":15,"set":2,"question":"銃を持つときは、銃口が不用意に人のいる方向に向かないように気をつけて取り扱わなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 保管等の取扱い"]},{"id":16,"set":2,"question":"銃の薬室や弾倉内の実包装填の有無を確認することは、クセにして身につけておいたほうが良い。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 保管等の取扱い"]},{"id":17,"set":2,"question":"都道府県公安委員会は、猟銃や空気銃、実包等を保管している者に対し、保管の状況について必要な報告を、1年に1回の銃砲検査の際に行うことにしている。","answer":false,"explanation":"都道府県公安委員会は、銃や火薬の保管状況について、必要に応じて報告を求めることがあります。","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":18,"set":2,"question":"射撃中に銃に何らかの違和感を感じた場合でも、射撃は止めないほうが良い。","answer":false,"explanation":"射撃中に何らかの異常を感じたときは、直ちに射撃することをやめ、銃を肩からおろし、機関部を開放しましょう。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項"]},{"id":19,"set":2,"question":"猟銃や空気銃の所持許可が失効したときは、必ず住所地を管轄する警察署に所持許可証を返納しなければならない。","answer":false,"explanation":"所持許可証に複数の銃が記載されている場合は、所持許可証を返納する必要はありません。この場合、所持許可証から失効した銃の記載事項が「抹消」されます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":20,"set":2,"question":"ライフル銃及び空気銃の場合、弾倉に6発以上の実包が装填できる構造のものは所持許可の対象とならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":21,"set":2,"question":"実包などの猟銃用火薬類を保管する場所は、盗難や防火などの対策を行っておくべきである。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":22,"set":2,"question":"都道府県公安委員会からの指示に従わなかった場合には、銃の所持許可が取り消されることがある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":23,"set":2,"question":"引き金の「あそび」は銃の故障なので、引き金にあそびがある場合はすぐに銃砲店に修理を依頼する。","answer":false,"explanation":"引き金の「あそび」は引き金と逆鈎の噛み合いの余裕を作る大事な設計の一部です。よって「あそびを無くす」というのは危険な調整です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§3 撃発機構及び安全装置"]},{"id":24,"set":2,"question":"初矢（一発目）が発射されたのに二の矢（二発目）が発射されない現象は、装弾の不良が原因なので、再度引き金を引いても弾は発射される心配はない。","answer":false,"explanation":"次射不能の主な原因は、初矢で引き金を引いた指の戻しが少なかった場合や、肩付けが不十分だったなどの射手による原因が主です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§3 撃発機構及び安全装置"]},{"id":25,"set":2,"question":"所持許可を受けた人が亡くなった場合、その親族や同居人、家主は所持許可証をすみやかに廃棄しなければならない。","answer":false,"explanation":"所持許可を受けた人が亡くなった場合は、親族や同居人、家主は、死亡事実を知った10日以内に所持許可証を警察署に返納しなければなりません。処分してしまう前に注意しましょう。","references":["第1編 猟銃及び空気銃の所持に関する法令","§2 所持許可の効力とその消滅の法令"]},{"id":26,"set":2,"question":"実包を消費する目的が明確でない場合、猟銃用火薬類等の譲受は許可されない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃用火薬類等に関する法令"]},{"id":27,"set":2,"question":"自分自身や友人が猟銃や空気銃を扱うときに誤った取扱いをしないように、お互い注意し合わなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":28,"set":2,"question":"ライフル銃で使用するライフルドスラッグと呼ばれる弾丸は、最大到達距離が約700メートルに及ぶものもある。","answer":false,"explanation":"「ライフルドスラッグ」（スラッグ弾や単発弾と呼ばれることもある）は、散弾銃で使用する装弾です。散弾ではなく1発の大きな弾を発射します。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":29,"set":2,"question":"有害鳥獣駆除のために獲物を捕獲する場合であっても、銃による事故を防止することを優先しなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の所持についての事項","§5 猟銃・空気銃の基本的取扱い"]},{"id":30,"set":2,"question":"夜間に狩猟をする場合は、昼間以上に周囲の状況に注意を払い、誤射の危険性に十分配慮しなければならない。","answer":false,"explanation":"日出前・日没以降の銃猟行為は禁止されています。なお、指定管理鳥獣捕獲等事業に従事する認定鳥獣捕獲等事業者が行う捕獲行為には、夜間銃猟が例外的に認められる場合があります。ただしこれは通常の「狩猟」とは制度的に異なります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":31,"set":2,"question":"銃は、もともと遠くにいる動物を狩るためや人を殺傷するために作られた危険な道具である。","answer":true,"explanation":"銃の所持許可は、所持許可を申請する人の住所地（住民票を置く都道府県）を管轄する警察署に申請します。本籍地ではありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 銃砲・空気銃所持者の社会的責任"]},{"id":32,"set":2,"question":"猟銃や空気銃の所持許可を受けるには、本籍地を管轄する警察署に申請する必要がある。","answer":false,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":33,"set":2,"question":"銃身部に異常を認めた場合、自動銃など薬室側から銃身内部を覗きにくい構造の銃では、取り外して確認する必要がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§2 使用前の注意事項"]},{"id":34,"set":2,"question":"銃を発射した結果、思いもよらない方向にいた人に当たって怪我を負わせた場合の責任は、全て発射した人の責任である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項"]},{"id":35,"set":2,"question":"山の尾根に獲物がいる場合は、斜面の下から撃ち上げるように射撃をする方法が、もっとも安全性が高い。","answer":false,"explanation":"尾根筋に獲物がいる場合、斜面の下から撃つと、狙いが反れた弾が尾根の奥へ消えるため、死角になっている場所にいる人に直撃する危険性があります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§5 猟銃・空気銃の基本的取扱い"]},{"id":36,"set":2,"question":"薬室の閉鎖が不完全な銃で射撃をすると、重大な事故を引き起こすことがある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§2 使用前の注意事項"]},{"id":37,"set":2,"question":"狩猟用途で猟銃を持つ場合、18歳以上から所持許可を受けることができる。","answer":false,"explanation":"狩猟用途の猟銃（散弾銃やライフル銃）の所持許可は、20歳以上でなければ受けることはできません。ただし、標的射撃用途に限り、18歳以上なら所持許可を受けられる例外があります。","references":["第2編 猟銃及び空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":38,"set":2,"question":"狩猟や有害鳥獣駆除に際して野外で装填するときには、銃口を上に向けておき、万が一暴発が発生した場合でも上空に弾が発射されるようにしなければならない。","answer":false,"explanation":"野外で装填する際は、銃口を柔らかい地面など跳弾が発生しにくい方向に向けます。上空に向けると流れ弾を作る原因になり危険です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項"]},{"id":39,"set":2,"question":"公共交通機関を利用して実包を運搬する場合、交通機関の種類に関わらず完全な包装をして、安全に運搬するようにしなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§1 実包の運搬"]},{"id":40,"set":2,"question":"猟銃や空気銃は、基準にあったガンロッカー以外で保管することはできない。","answer":false,"explanation":"ガンロッカーと同等の基準で作られた堅固な設備であれば、銃を保管できます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§3 猟銃・空気銃の保管の一般事項"]},{"id":41,"set":2,"question":"「撃鉄（ハンマー）」とは、リボルバー式の拳銃などに使われる部品であり、散弾銃やライフル銃といった猟銃には無い。","answer":false,"explanation":"猟銃の場合は外から見えませんが、機関部の中に撃鉄（ハンマー）があります。なお、元折れ単身銃や水平二連銃には、「有鶏頭銃」というタイプもあります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 第1章 銃の種類等","§3 撃発機構及び安全装置","§6 所持許可の更新とその効果"]},{"id":42,"set":2,"question":"所持許可の更新手続きをせずに有効期間が満了すると、所持許可が失効する。","answer":true,"explanation":"","references":["第4編 猟銃及び空気銃の所持に関する法令","§3 猟銃・空気銃の所持の基準と除外事項"]},{"id":43,"set":2,"question":"認知症である人は、猟銃や空気銃の所持許可を受けることができないこともある。","answer":false,"explanation":"認知症の診断を受けた人は、絶対に所持許可を受けることはできません。","references":["第1編 猟銃及び空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":44,"set":2,"question":"許可を受けた猟銃や空気銃を所持している人が、友人にそれらの銃を貸し出すと、貸し出し手と受け取り手の両方が法律違反になる。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§1 猟銃・空気銃の所持の禁止と例外事項"]},{"id":45,"set":2,"question":"プレチャージ式空気銃は、発射のエネルギー源に小型ボンベに入った圧縮炭酸ガスを利用する構造の銃である。","answer":false,"explanation":"プレチャージ式空気銃は、銃に取り付けられたエアシリンダーに、外部から高圧空気を注入して溜める構造です。圧縮炭酸ガスを使用するのは「圧縮ガス式空気銃」です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い 第1章 銃の種類等","§1 銃の種類"]},{"id":46,"set":2,"question":"銃を片手で握るなどの保持は、誤って取り落とす可能性があるので慎むべきである。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§1 猟銃・空気銃の基本的取扱い"]},{"id":47,"set":2,"question":"猟銃用火薬類の譲受許可には譲受票に譲り受けた年月日や数量等の記載を受けなければならないが、無許可譲受にはそのような記載は必要ない。","answer":false,"explanation":"無許可譲受票であっても、火薬店から記載を受ける内容に変わりはありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃用火薬類等に関する法令"]},{"id":48,"set":2,"question":"実包の管理状況を記載する帳簿の備えは努力義務であり、帳簿に記載をしなかったとしても処罰されることはない。","answer":false,"explanation":"帳簿の作成・備え付けは義務であり、違反すると処罰される可能性があります。","references":["第1編 猟銃及び空気銃の所持に関する法令","§2 使用前の注意事項"]},{"id":49,"set":2,"question":"不発弾は弾が発射される危険性はないため、一般ゴミとして処分できる。","answer":false,"explanation":"不発弾も火薬類と変わりはないため、火薬店に引き取って処分してもらいます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§5 猟銃・空気銃の基本的取扱い"]},{"id":50,"set":2,"question":"都道府県公安委員会から実包等の保管状況について報告を求められた場合には、その報告を求められた時点での、残弾数と残火薬量を口頭で報告すればよい。","answer":false,"explanation":"実包や火薬類の管理状況は、専用の帳簿を備えておかなければなりません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":1,"set":3,"question":"猟銃や空気銃の発射制限に違反した者は、罰金に処せられる場合がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":2,"set":3,"question":"自宅で保管できる実包や空包は800個以内である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":3,"set":3,"question":"猟銃や空気銃を、射撃を目的以外の道具として使用することは、暴発事故や銃の故障を引き起こす原因となるため、絶対にしてはならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":4,"set":3,"question":"故障している銃は、たとえ盗難されても犯罪に使用されるリスクは無いので、他人に預けておくことができる。","answer":false,"explanation":"故障している銃であっても、銃の管理は本人が行わなければなりません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":5,"set":3,"question":"所持許可を受けた銃を、引き続き3年間許可を受けた用途に使用しないとき、所持許可は取消される。","answer":false,"explanation":"所持許可を受けた用途で引き続き「2年間」使用実績がない場合、「ねむり銃」とみなされて所持許可が取消されます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§6 所持許可の取消し"]},{"id":6,"set":3,"question":"ライフル銃の最大到達距離は、主として使用される実包の種類によって決まる。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":7,"set":3,"question":"銃砲の所持者は、猟銃の操作及び射撃に関する技能を維持向上させるよう努めなければならない。ただし「狩猟」で所持許可を受けている場合は、この限りではない。","answer":false,"explanation":"用途に関係なく、銃砲の所持者は銃を安全に使用するために、射撃の練習を行う努力義務があります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":8,"set":3,"question":"年少射撃資格の認定を受けようとするものは、空気銃の場合は日本スポーツ協会加盟地方団体からの推薦を受ける必要がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":9,"set":3,"question":"実包は重量があるため、容器もその重量に耐えられる丈夫なものが必要である。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":10,"set":3,"question":"裁判所が破産手続の開始を決定し、未だ復権をしていない者は、猟銃や空気銃の所持許可を受けることができない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 銃砲・空気銃所持者の社会的責任"]},{"id":11,"set":3,"question":"猟銃や空気銃を所持するための申請には、年齢や経歴などの条件は存在しない。","answer":false,"explanation":"猟銃・空気銃の所持許可制度には、年齢や犯罪歴などによって所持許可申請ができない「欠格事項」が存在します。","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 銃砲・空気銃所持者の社会的責任"]},{"id":12,"set":3,"question":"スライド・アクション銃は、排莢や装填といった連発に必要な操作を先台を握る手で行う銃で、散弾銃に多い。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§1 銃の種類"]},{"id":13,"set":3,"question":"散弾銃でスズメを撃つときは、最も弾の直径が小さい1号弾が適している。","answer":false,"explanation":"散弾銃の弾は、番号が大きくなるほど直径が小さくなります。弾が小さければ大量の弾を薬莢に詰めることができるので、小さな獲物には号数の大きい弾が向いています。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":14,"set":3,"question":"所持許可証をなくしたり、盗まれたりしたときは、すべての所持許可が取り消される。","answer":false,"explanation":"所持許可証を失くした場合は、再交付の申請をおこなうことができます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§4 所持許可証"]},{"id":15,"set":3,"question":"申請者の生活態度や素行に問題があると判断して、都道府県公安委員会はそれを理由に所持許可申請を却下することはできない。","answer":false,"explanation":"欠格事由には「やって良いことと悪いことの区別がつかない人や悪いと分かっていることをやってしまう人など」も含まれ、所持許可が下りることはありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":16,"set":3,"question":"遅発のときは、10秒程度そのままの姿勢で銃口を安全な方向に向けたまま、銃を確実に保持し、不発と判断して機関部を開放する。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":17,"set":3,"question":"平地で猟銃や空気銃を発砲するときは、水平に近い角度で発射すれば威力も命中精度も高くなるため、望ましい射撃方法と言える。","answer":false,"explanation":"平地で銃を水平発射すると、物陰などの見えない場所にいる人に弾が命中する危険性があり危険です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":18,"set":3,"question":"狩猟者登録を受けた者は、登録証の有効期間が満了した際の残り火薬は、購入した日から1年は適法に所持できる。1年を経過した時は遅滞なく譲渡または廃棄しなければならない。","answer":false,"explanation":"狩猟の用途で実包等を購入した場合、「狩猟者登録の有効期限が切れた日」（つまり狩猟期が終わった日）から1年間（つまり次年度の狩猟期が終わる日）まで適法に所持できます。購入してから1年間ではありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第3章 猟銃用火薬類等に関する法令"]},{"id":19,"set":3,"question":"水面に向けて射撃した場合も跳弾となる場合がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":20,"set":3,"question":"銃から弾倉を取り外し、薬室に弾が入っていないことを確認していれば、銃はただの金属の筒なので、慎重に扱う必要はない。","answer":false,"explanation":"銃に弾が入っていないことが確実であったとしても、銃の扱いは常に「実包が入っているもの」と思いながら、適切に取り扱いましょう。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い"]},{"id":21,"set":3,"question":"散弾銃は、一粒の散弾はライフル銃よりも威力が弱いから、ライフル銃よりも矢先の安全に注意する必要はない。","answer":false,"explanation":"散弾銃は広範囲に弾が広がるという性質があるため、思わぬところに弾が命中する危険性があります。そのためライフル銃と同等以上に矢先に気をつけなければなりません。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§4 銃の威力と危険範囲"]},{"id":22,"set":3,"question":"猟銃や空気銃を保管するためのガンロッカーは、すべての部位が1ミリメートル以上の厚さの鋼板で作られているだけでよい。","answer":false,"explanation":"ガンロッカーは、すべての部位が1ミリメートル以上の厚さの鋼板である以外に、扉の構造や設備の内部に鍵などの銃を固定する装置を有していることなど、複数の条件があります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§3 猟銃・空気銃の保管の一般準則"]},{"id":23,"set":3,"question":"都道府県公安委員会は、所持許可を受けた者に一定の取消事由が発生した場合、銃の提出を求めることができる。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§6 指示及び所持許可の取消し"]},{"id":24,"set":3,"question":"銃を発射するときは、「獲物をしとめる」や「大会で良い成績を残す」よりも、人の生命や身体、財産に危害を及ぼさないように注意することが何よりも大切である。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":25,"set":3,"question":"所持許可の更新手続きをせずに有効期間が満了すると、所持許可は取消しを受ける。","answer":false,"explanation":"所持許可を更新せずに有効期間が満了すると、取消しではなく「失効」になります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§5 所持許可の更新とその手続き"]},{"id":26,"set":3,"question":"運送業者に実包を運搬させる場合には、盗難を防止するために「スポーツ用品」という名目で送った方が良い。","answer":false,"explanation":"運送業者に内容物を偽って火薬類を運ばせることは違反になります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第4章 事故の通報及び安全についての一般準則"]},{"id":27,"set":3,"question":"狩猟や有害鳥獣駆除における人身事故では、いわゆる「矢先」と呼ばれる発射方向の安全確認不足が大きな原因となっている。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":28,"set":3,"question":"銃に違和感を覚えたり、不良箇所を発見した場合は、速やかに銃砲店に検査や修理をしてもらう必要がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 撃発機構及び安全装置"]},{"id":29,"set":3,"question":"猟銃又は空気銃をなくしたり盗まれたりしたのに警察署に届け出なかった者は、罰金に処せられる場合がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":30,"set":3,"question":"「仕事帰りに射撃をしたいから」、「自宅まで銃を取りに帰るのが面倒だ」。このような理由で猟銃等保管業者に銃の保管を委託することはできない。","answer":false,"explanation":"銃の保管を猟銃等保管業者に委託することに、条件などはありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":31,"set":3,"question":"猟場の地形等の情報、獲物の習性などを熟知しておくことは、銃による事故防止に役立つ。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 銃砲・空気銃所持者の社会的責任"]},{"id":32,"set":3,"question":"猟銃等を自ら保管する義務に違反した者は、公安委員会から改善の指導を受ける場合があるが、刑事罰を受けることはない。","answer":false,"explanation":"保管義務違反を犯した場合は、罰金に処せられる場合があります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":33,"set":3,"question":"狩猟等で、獲物の確認に少しでも不安があるときは、銃を発射してはならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":34,"set":3,"question":"火薬類は高温や多湿、時間経過などで変質し、本来の性能を発揮できなくなる可能性がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3章 実包の運搬及び保管についての一般準則","§2 火薬類の保管"]},{"id":35,"set":3,"question":"所持許可証の返納は、必ず所持許可を受けた本人がしなければならない。","answer":false,"explanation":"猟銃・空気銃を個人間で譲り受け渡し（有償・無償問わず）する場合は、所持許可を受けた本人が所持許可証を管轄する警察署に返納します。しかし、銃砲店に譲り渡した場合は、銃砲店が所持許可証を管轄する警察署に返納することになっています。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§4 所持許可証とその他の手続き"]},{"id":36,"set":3,"question":"都道府県公安委員会は、猟銃や空気銃の所持許可申請に対して、必ずしも全てを許可するわけではない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":37,"set":3,"question":"許可を受けた後に輸入しようとする火薬類の種類や数量を変更する場合は、許可の書換えが必要である。","answer":false,"explanation":"許可を受けた後に輸入しようとする火薬類の種類や数量、目的、陸揚場所を変更する場合は、許可を新たに受ける必要があります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第3章 猟銃用火薬類等に関する法令"]},{"id":38,"set":3,"question":"二発目が発射できない次射不能と呼ばれる原因はすべて銃に問題があり、速やかに銃砲店に修理を依頼しなければならない。","answer":false,"explanation":"次射不能の原因には、銃の要素もありますが、肩付けが悪いことや、引き金を引く指の戻しが不十分なことなど、射手に問題がある可能性も考えられます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§2 撃発機構及び安全装置"]},{"id":39,"set":3,"question":"散弾銃の番径の数字は、その口径の長さを直接示しているわけではなく、一種の重量表示法である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","§1 銃の種類"]},{"id":40,"set":3,"question":"相手がベテランハンターだとしても、銃口が人に向いているなどの危険な保持をしていた場合、注意をすべきである。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1章 銃砲・空気銃所持者の社会的責任"]},{"id":41,"set":3,"question":"引き金の重さは、射撃用の銃では1.5kg以上、狩猟用の銃では2.0kg以上が安全上の目安とされている。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§2 使用前の注意事項"]},{"id":42,"set":3,"question":"安全子を引いた状態では引き金を引いても撃発機構は作動しないため、実包を装填したまま運搬するときは、必ず安全子を引いておかなければならない。","answer":false,"explanation":"たとえ安全子（セーフティロック）をかけていたとしても、銃に振動が加わると逆鈎が外れて暴発を起こす可能性があるので、実包を装填したまま運搬は避けてください。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 撃発機構及び安全装置"]},{"id":43,"set":3,"question":"所持許可を受けた猟銃・空気銃は個人の所有物なので、自由に改造できる。","answer":false,"explanation":"猟銃や空気銃の所持者は、法定の基準に適合しない銃に改造してはいけません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":44,"set":3,"question":"許可を受けた銃と認められないような大幅な改造を施した場合、その時点で許可は取消され、さらに不法所持として罪に問われる。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令"]},{"id":45,"set":3,"question":"ガンロッカーは銃の保管を忘れないように、玄関などに設置しておくことが望ましい。","answer":false,"explanation":"ガンロッカーが管理しやすい場所に置くことが望ましいですが、盗難防止のため、できるだけ人目に付かない場所に設置します。具体的には、自室の押し入れやクローゼット内などに置かれています。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§3 猟銃・空気銃の保管の一般準則"]},{"id":46,"set":3,"question":"銃を携帯、運搬する場合は、銃に覆いをかぶせるか容器に入れなければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持についての遵守事項"]},{"id":47,"set":3,"question":"狩猟中に獲物を取り逃したときは、次のチャンスに素早く対応するために、薬室に実包や金属製弾丸が装填されていることを確認しなければならない。","answer":false,"explanation":"発射する必要が無くなったときは、何よりも先に薬室を解放し脱包します。また、銃を手にしたときも、まず先に薬室を開き、装填されていないことを確認します。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2章 銃砲・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":48,"set":3,"question":"銃は重量があるほど精度性が向上するため、なるべく重いものを選んだほうがよい。","answer":false,"explanation":"銃は、使用する人の技量や体力に合わせて適切な物を選定しましょう。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い"]},{"id":49,"set":3,"question":"技能検定や射撃教習を受けるためには、猟銃の所持許可を受けている必要がある。","answer":false,"explanation":"技能検定や射撃教習には、射撃場備え付けの銃砲を使用します。猟銃の所持許可が下りるのは技能検定または射撃教習を修了して、所持許可を申請してからになります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§9 銃砲・空気銃の所持の禁止と除外事由"]},{"id":50,"set":3,"question":"海外旅行のため猟銃の所持許可の更新を受けることができなかった人で交付後3年以内の技能講習修了証明書を所持する人は、帰国後1ヶ月以内であれば、射撃教習を受講することなく、猟銃の所持許可を受けることができる。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2章 銃砲・空気銃の所持に関する法令","§6 所持許可の更新とその手続き"]},{"id":1,"set":4,"question":"鳥獣保護区で狩猟鳥獣を捕獲したら、非狩猟鳥獣を捕獲することは違反となるが、弾が獲物に命中しなければ違反にはならない。","answer":false,"explanation":"たとえ撃った弾が獲物に命中しなくても、鳥獣保護区や非狩猟鳥獣に向けて発砲した場合は狩猟行為とみなされて違反となります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第4編 狩猟に関する法令","§2 鳥獣の保護"]},{"id":2,"set":4,"question":"銃に弾丸を装填してよいのは、獲物を確実に確認できたときと、射台に入って射撃の準備が完全に整ったときである。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":3,"set":4,"question":"一般人に銃を譲り渡す場合には、必ず銃を手渡し、所持許可証の原本を対面で確認しなければならない。","answer":false,"explanation":"個人間で銃を譲受け・譲渡をする場合でも、運送業者を利用できます。ただし、運送業者に相手方から許可証の提示を受けた上で、配達時には運送業者が本人確認書類を確認するよう要求しておく必要があります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":4,"set":4,"question":"ガンロッカーなどの保管設備は、必ず柱や壁に固定しておかなければならない。","answer":false,"explanation":"ガンロッカーは、ガンロッカーごと盗み出されないように、柱や壁に固定することが望ましいといえます。ただし、必ずしも柱や壁に固定する必要はなく、ガンロッカー内に重りを入れるなどで対応することも可能です。","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":5,"set":4,"question":"猟銃や空気銃の「所持」とは、物に対する事実上の支配をいい、その形態として「携帯」と「運搬」の2つがある。","answer":false,"explanation":"猟銃や空気銃の「所持」には、携帯（人が持って歩く）と運搬（車などに積んで移動する）に加え、「保管」（自宅のガンロッカーに入れておく）も含まれます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§1 猟銃の所持制限と所持許可"]},{"id":6,"set":4,"question":"弾が予期せぬ方向に飛ぶ「跳弾」は、コンクリートや竹、固い岩などに弾が高速で命中することで発生する。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":7,"set":4,"question":"たとえ実包の譲受許可が2000個受けたとしても、自宅で保管できる実包の数は800個以内である。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第4編 猟銃用火薬類の取扱い"]},{"id":8,"set":4,"question":"施錠できる引き出しのあるガンロッカーは装弾ロッカーを兼ねた設計であり、銃と適合実包を一緒に管理できる。","answer":false,"explanation":"どのような理由があっても、銃と実包などを一緒の設備内で保管することはできません。引き出しのあるガンロッカーは、先台や撃針などを分離して保管するために使用します。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":9,"set":4,"question":"散弾銃は口径のサイズ（番径）が大きければ大きいほど弾は遠くに飛ぶ。","answer":false,"explanation":"散弾銃の番径と弾の最大到達距離は関係ありません。たとえば、20番9号の実包と、12番9号の実包は、口径のサイズは違いますが、中に入っている弾の大きさは同じです。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 銃の種類等","§4 銃の威力と危険範囲"]},{"id":10,"set":4,"question":"大気中では、発射角度が30度のときに最大射程となることなど、猟銃や空気銃の所持者は、どのような場合に最も遠くまで弾が飛ぶかを知っておく必要がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 銃の種類等","§4 銃の威力と危険範囲"]},{"id":11,"set":4,"question":"狩猟目的で使用する猟銃や空気銃は、獲物が飛び出して来たときにすぐに弾を発射できるように、引き金は極力軽くしておくことが望ましい。","answer":false,"explanation":"引き金の重さが軽すぎると、銃に衝撃が加わっただけで暴発する危険性があります。そのため猟銃や空気銃は、射撃用で1.5kg以上、狩猟用は2kg以上が安全の目安とされています。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§1 猟銃及び空気銃の基本的取扱い","第1編 銃の構造等","§3 撃発機構及び安全装置"]},{"id":12,"set":4,"question":"自殺をするおそれがある人は、猟銃や空気銃の所持許可を受けることができない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":13,"set":4,"question":"たとえ、分解して銃身だけとなっているときでも銃口は、人の方向に向けてはならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":14,"set":4,"question":"銃身や機関部等の接合部分にあるゆるみは「遊び」と呼ばれており、必要な設計である。","answer":false,"explanation":"銃の「遊び」は、引き金に指をかけたときに軽く感じる部分のことです。銃身部や機関部の接合部にあるゆるみは「遊び」ではなく、故障の可能性があります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§2 使用前の注意事項"]},{"id":15,"set":4,"question":"猟銃や空気銃を銃砲店に引き渡す時点で許可証に他の有効な許可事項が記載されていない場合、銃と併せて許可証も銃砲店に引き渡す。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","§7 所持許可の失効とその後の手続き"]},{"id":16,"set":4,"question":"技能講習修了証明書の有効期間が満了していたとしても、災害や病気などのやむを得ない理由で失効した場合、そのやむを得ない理由が終わった1ヶ月以内であれば、射撃教習を受講することなく猟銃の所持許可を受けることができる。","answer":false,"explanation":"たとえやむを得ない理由であったとしても、技能講習修了証明書の交付から3年以上経過してしまうと、その効力は失われます。再び猟銃の所持許可を受ける場合は、射撃教習を受講する必要があります。","references":["第1編 猟銃及び空気銃の所持に関する法令"]},{"id":17,"set":4,"question":"銃の所持者が道路交通法違反で罰金の刑に処せられた場合は、都道府県公安委員会はその所持許可を取り消すことができる。","answer":false,"explanation":"所持許可が取消される要件は、銃刀法違反・火気法違反の「罰金」の刑に処せられた場合です。また、どのような罪状に関わらず「拘禁刑」以上の罪に処せられた場合も、所持許可は取り消されます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§6 所持及び所持許可の取消し"]},{"id":18,"set":4,"question":"旅客機を利用して猟銃用火薬類を運搬する場合には、盗難を防止するために手荷物として機内に持ち込む必要がある。","answer":false,"explanation":"旅客機内に火薬類を持ち込むことはできません。通常は受託手荷物として航空会社に預けますが、会社によって厳しい規制があるので、必ず確認しておきましょう。","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃用火薬類に関する法令","§4 猟銃用火薬類の取扱い"]},{"id":19,"set":4,"question":"銃の安全装置は、引き金の動きを止める作用しかない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 銃の種類等","§3 撃発機構及び安全装置"]},{"id":20,"set":4,"question":"実包の管理状況を記載する帳簿には、ライフル銃については、実包の名称を記載する必要がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第4編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":21,"set":4,"question":"技能講習の種類は、「ライフル銃」、「ライフル銃以外の猟銃」、「空気銃」の3種類がある。","answer":false,"explanation":"空気銃の技能講習はありません。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§6 所持許可の更新とその手続き"]},{"id":22,"set":4,"question":"銃の盗難や紛失は、銃を使った凶悪犯罪につながる危険性のある重大な事件である。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃及び空気銃の使用、保管等の取扱い","§5 空気銃の保管等"]},{"id":23,"set":4,"question":"狩猟で獲物に照準をつけるときは、とにかく獲物の存在だけに集中して、周囲の状況はなるべく見ないようにしたほうがよい。","answer":false,"explanation":"銃で獲物を狙う際は、引き金を引く最後の最後まで周囲の状況に気を配り、少しでも発射に不安を感じたら発射を止めましょう。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":24,"set":4,"question":"「構造・機能の基準維持義務違反」とは、たとえば散弾銃の弾倉を3発以上装填できるように変更した場合などが該当する。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":25,"set":4,"question":"銃の盗難だけでなく、実包などの火薬類の盗難も、重大犯罪につながる危険性がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第1編 猟銃・空気銃の所持者の社会的責任","§1 銃の所持者の心得"]},{"id":26,"set":4,"question":"狩猟等で、獲物がどこにいるかわからない。そのため銃には弾を装填したまま移動したほうがよい。","answer":false,"explanation":"狩猟では獲物がいつどこから飛び出してくるかわかりません。このような場合も銃に弾を入れるまま移動してはいけません。銃に弾を装填するのは、猟場の射撃ポイントに到着し、足場が確定した状態、または獲物が確実に視認できた状態などに限ります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第2編 猟銃・空気銃の使用、保管等についての事項"]},{"id":27,"set":4,"question":"猟銃や空気銃の所持者は、配偶者以外には銃に触れさせることがないよう日頃から注意しておくことが大切である。","answer":false,"explanation":"たとえ家族であっても、銃を他人に触れさせてはいけません。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 猟銃及び空気銃の所持に関する法令"]},{"id":28,"set":4,"question":"公共交通機関には持ち込める猟銃用火薬類の量が決まっているので、それをオーバーする場合は同行者複数人で分担して持ち込むようにする。","answer":false,"explanation":"許可を受けていない同行者に、実包や火薬類を預けることはできません。","references":["第1編 猟銃及び空気銃の使用、保管等の取扱い","第3編 実包の運搬及び保管についての一般事項","§1 実包の保管"]},{"id":29,"set":4,"question":"空気銃は、装薬を燃焼したガスでピストンを押して空気を圧縮し、金属性弾丸を発射する銃である。","answer":false,"explanation":"空気銃では火薬の燃焼ガスを利用しません。火薬を使用する銃は空気銃ではなく「猟銃」に分類されます。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§1 銃の種類"]},{"id":30,"set":4,"question":"警察官から許可証の提示を求められたにもかかわらずこれを拒んだ者は、罰金に処せられる場合がある。ただし、「自宅に忘れた」などの理由があれば、その限りではない。","answer":false,"explanation":"銃を携帯・運搬中は、必ず所持許可証の原本を携帯しておく必要があります。たとえ自宅にあったとしても、不携帯で処罰されます。","references":["第2編 猟銃・空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":31,"set":4,"question":"「用心金」とは、引き金が不用意に動いて発砲することのないよう、引き金のまわりを囲んである金具である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":32,"set":4,"question":"実包の譲り受けや消費、製造などに係る証拠の書類は、検査のときに直ちに示せるようにしておく必要がある。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§5 猟銃・空気銃の所持についての遵守事項"]},{"id":33,"set":4,"question":"所持許可を受けた猟銃や空気銃の同一性を失わせる程度に改造した場合、その許可は失効する。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§7 所持許可の失効とその後の手続き"]},{"id":34,"set":4,"question":"射撃に関するルール違反やマナー違反で注意を受けたときは素直に従わなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§1 猟銃・空気銃の基本的取扱い"]},{"id":35,"set":4,"question":"徹底した銃の操作練習は、心の余裕となり、銃による事故を防ぐ効果がある。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 猟銃及び空気銃の所持に関する法令","§4 銃の威力と危険範囲"]},{"id":36,"set":4,"question":"木の葉、雪などの異物が銃腔内に詰まったまま射撃をしても、高圧で吹き飛ばされるため問題は起こらない。","answer":false,"explanation":"銃腔内に異物が詰まった状態で射撃をすると異常高圧が発生し、銃身が破裂することがあります。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§2 使用前の注意事項"]},{"id":37,"set":4,"question":"散弾の散布範囲は広範囲であるため、発射前の安全確認はできるだけ広い範囲の確認を行うことが必要である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":38,"set":4,"question":"既に所持許可証の交付を受けている人が別の銃について新たに所持許可を受けた場合、新しい所持許可証が別に交付される。","answer":false,"explanation":"すでに所持許可を受けている人が、2丁め以降の銃を所持する場合、すでに持っている所持許可証に追加される形で記載されます。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":39,"set":4,"question":"猟銃や空気銃の所持許可は、「狩猟」、「有害鳥獣駆除」、「標的射撃」といった目的のある者が申請し受け取ることができる。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第3編 猟銃・空気銃の所持許可に関する法令"]},{"id":40,"set":4,"question":"自身が所持する猟銃や空気銃の構造を熟知することは、危険を防止するうえで重要である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第1編 銃の種類等","§3 撃発機構及び安全装置"]},{"id":41,"set":4,"question":"実包又は金属性弾丸が6発以上（散弾銃は3発以上）の弾倉を銃に取り付けるのは違反だが、このような弾倉を所持しているぶんには違反にはならない。","answer":false,"explanation":"違反性のある弾倉は、所持しているだけで違反になります。","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":42,"set":4,"question":"空気銃の口径は、4.5ミリメートルと5.5ミリメートルのものが一般的である。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§2 銃の種類別特徴"]},{"id":43,"set":4,"question":"引っ越しなどで住所が変わったときは、所持許可証の書換えを受けなければならない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持許可に関する法令"]},{"id":44,"set":4,"question":"所持許可の交付を受けた後は、いかなる理由があっても条件が付されることは無い。","answer":false,"explanation":"所持許可が下りたあとも、「銃を猟銃等保管業者に保管させること」などのように条件が追加されることもあります。","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令","§2 所持許可制度の概要"]},{"id":45,"set":4,"question":"手詰め（ハンドローディング）で装弾を製造することは危険性も大きいため、火薬類の取扱いは慎重にさせなければならない。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 実包の運搬及び保管についての一般事項","§2 火薬類の保管"]},{"id":46,"set":4,"question":"跳弾とは、竹や岩などに弾を命中させて、発射した弾を獲物に命中させる射撃の高等テクニックである。","answer":false,"explanation":"跳弾は偶然的に発生するため、弾がどこに飛んでいくかの予想がつかない危険な現象です。","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","第3編 猟銃・空気銃の使用、保管等についての事項","§1 猟銃・空気銃の基本的取扱い"]},{"id":47,"set":4,"question":"狩猟中に用心金に指を入れて良いのは、獲物が確実に確認できた場合に限られる。","answer":true,"explanation":"","references":["第2編 猟銃及び空気銃の使用、保管等の取扱い","§1 猟銃・空気銃の基本的取扱い"]},{"id":48,"set":4,"question":"新しく所持した猟銃を友人に見せるために、友人宅まで銃を運搬することには違法性はない。","answer":false,"explanation":"猟銃や空気銃は、所持許可を受けた用途（＋修理や銃検などの）でなければ、携帯や運搬はできません。「友人に銃を見せに行く」というのは、正当な理由として認められません。","references":["第1編 猟銃及び空気銃の所持に関する法令","§9 猟銃・空気銃の所持についての遵守事項"]},{"id":49,"set":4,"question":"居宅内であっても、銃を壁に立てかけておくなど、家族等が自由に持ち出せる状態にしている場合は、自ら保管しているとはいえない。","answer":true,"explanation":"","references":["第1編 猟銃及び空気銃の所持に関する法令","第2編 猟銃・空気銃の所持に関する法令"]},{"id":50,"set":4,"question":"猟銃・空気銃を所持できるというのは民間人の権利である。その銃をどのように扱うかについては、国が介入すべき話ではない。","answer":false,"explanation":"猟銃・空気銃はひとつ間違えると、重大な事故や犯罪が起こる危険性の高い道具です。所持者は「事故や犯罪が起こらないように、しっかりと管理しなければならない」という理念が国から求められています。","references":["第1編 猟銃及び空気銃の所持に関する法令","第1編 猟銃・空気銃の所持者の社会的責任","§1 日本で銃を所持するためには"]},{"id":1,"set":5,"question":"ライフル銃は薬室を含めて6発まで装填できるが、状況に応じて必要最低限の個数を装填したほうが良い。","answer":true,"explanation":"銃の所持者には、なによりも事故を防ぐという心構えが大切です。環境に対して銃を構えたときも、周囲状況に少しでも違和感を覚えたら、銃を下ろすような自制心を身に付けなければなりません。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の使用、保管等についての事例","第1章 銃砲・空気銃所持者の社会的責任","第1節 銃の所持者の心得"]},{"id":2,"set":5,"question":"狩猟の用途で猟銃や空気銃を所持したのであれば、何よりも獲物を捕獲することが大事である。獲物が現れたらすぐに射撃ができるように、素早く発砲ができるよう努力する必要がある。","answer":false,"explanation":"","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の使用、保管等についての事例","第1章 銃砲・空気銃所持者の社会的責任","第1節 銃の所持者の心得"]},{"id":3,"set":5,"question":"住居を建て替えるなどの特別な事情が発生した場合は、銃を猟銃等保管業者に預ける「委託保管」をすることが望ましい。","answer":true,"explanation":"","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第9章 銃砲・空気銃の所持についての遵守事項"]},{"id":4,"set":5,"question":"猟銃の撃発機構で、「撃針」とは打撃を受けて火花を放ち、装薬を燃焼させるものである。","answer":false,"explanation":"撃針は実包や空包の「雷管」を叩くための部品であり、撃針から火花が出るわけではありません。","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","第3章 撃発機構及び安全装置"]},{"id":5,"set":5,"question":"装弾ロッカーは、盗難防止に配慮した場所に設置しなければならない。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第3章 実包の運搬及び保管についての一般準則","第2節 火薬類の保管"]},{"id":6,"set":5,"question":"所持許可が失効してから50日を経過したときは、都道府県公安委員会は猟銃や空気銃の提出を命じることができる。ただし、仮領置はされない。","answer":false,"explanation":"所持許可が失効して50日を経過しても所持を続けている場合、公安委員会は銃の提出を命令するだけでなく、その銃を仮領置することがあります。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第7節 所持許可の失効とその他の手続き"]},{"id":7,"set":5,"question":"猟銃や空気銃の所持許可を申請する場合、都道府県公安委員会は、全ての許可申請に対して、必ず許可しなければならない場合がある。","answer":true,"explanation":"","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第2節 所持許可の概要"]},{"id":8,"set":5,"question":"銃メーカーが出す取扱説明書を読むだけでなく、自身が所持する銃の扱いにクセを把握しておくことも、危険を防止するうえで重要である。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","第3章 撃発機構及び安全装置"]},{"id":9,"set":5,"question":"実包の管理状況を記載する帳簿には、製造、譲受け、消費、廃棄の4つの項目を記載しておけばよい。","answer":false,"explanation":"実包管理帳簿には、製造・譲渡し・譲受け・交付し・交付され・消費・廃棄の7つの項目を記載します。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第9章 銃砲・空気銃の所持についての遵守事項"]},{"id":10,"set":5,"question":"銃を所持したい者は、都道府県公安委員会が発行する銃の所持免許を受ける必要がある。","answer":false,"explanation":"銃の所持は「許可」であり「免許」ではありません。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第2節 所持許可制度の概要"]},{"id":11,"set":5,"question":"実包を自身が運転する車で運搬する場合でも、盗難や紛失に注意しなければならない。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第3章 実包の運搬及び保管についての一般準則","第1節 実包の運搬"]},{"id":12,"set":5,"question":"実包を隙間のある状態で梱包して運搬すると、運搬中に実包が傷つくおそれがあるので、衣類と一緒に梱包して送ったほうが良い。","answer":false,"explanation":"実包や火薬類を、他の物に梱包して送ることは禁止されています。","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第3章 実包の運搬及び保管についての一般準則","第1節 実包の運搬"]},{"id":13,"set":5,"question":"猟銃・空気銃の所持許可を受けている者が、日常的に暴力を振るうような態度を取るようになったとしても、所持許可が取り消されることはない。","answer":false,"explanation":"他人に暴力を振るうような所持者に所持許可を与えておくことがふさわしくないと公安委員会が判断した場合、所持許可を取り消される場合があります。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第6節 指示及び所持許可の取消し"]},{"id":14,"set":5,"question":"猟銃や空気銃の所持経験が長い人は、銃の安全な取り扱いに長けているので、銃の扱い方に危険性を感じたとしても注意すべきではない。","answer":false,"explanation":"猟銃や空気銃の所持経験が長いからといって、その人が必ず安全な銃の取扱いができているという保証はありません。たとえ年長者であっても間違った扱い方をしていたら、注意し合わなければなりません。","references":["第1編 銃砲及び空気銃の所持に関する法令","第1章 銃砲・空気銃の基本的取扱い"]},{"id":15,"set":5,"question":"銃を前に所持許可を受けた者に譲り渡した場合、許可の抹消手続きや許可証の返納は譲り渡した者が行わなければならない。","answer":true,"explanation":"","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第9章 銃砲・空気銃の所持についての遵守事項"]},{"id":16,"set":5,"question":"保管設備のない射撃場では、銃を自分の身の回りに置いて管理しなければならない。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第2編 銃砲・空気銃の使用、保管等についての事例","第3章 銃砲・空気銃の保管の一般準則"]},{"id":17,"set":5,"question":"射撃中でどうしても銃を肩に掛ける必要があるときは、人のいる方向に銃口を向けないよう細心の注意を払わなければならない。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第2編 銃砲及び空気銃の使用、保管等についての事例","第1章 銃砲・空気銃の基本的取扱い"]},{"id":18,"set":5,"question":"銃本体に取り付けられたポンプを操作し、蓄圧室に高圧空気を蓄えて金属製弾丸を発射する構造の空気銃を、「ポンプ式空気銃」という。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第1章 銃の種類等","第1節 銃の種類"]},{"id":19,"set":5,"question":"銃が故障した場合、所持許可の有効期間が来るまでに修理をするか、手放すかをしなければならない。","answer":false,"explanation":"故障した銃を放置していた場合、構造・機能の基準維持義務違反となります。速やかに修理に出すか、処分をする場合は銃砲店に引き取ってもらいます。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2編 銃砲・空気銃の所持に関する法令","第9章 銃砲・空気銃の所持についての遵守事項"]},{"id":20,"set":5,"question":"射撃場や猟場を問わず、猟銃や空気銃を発射するときは事前に周囲の安全を十分に確認しなければならない。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第1章 銃砲・空気銃の基本的取扱い"]},{"id":21,"set":5,"question":"自動銃は排莢・装填を自動で行えるのが最大の長所である。そのため、銃には常に最大の3発を装填しておいたほうが良い。","answer":false,"explanation":"狩猟で自動銃を使う場合でも、猟場の状況や獲物の種類などを考慮して、必要最低限の装填数にとどめておくべきです。","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第2編 銃砲及び空気銃の使用、保管等についての事例","第2節 使用前の注意事項"]},{"id":22,"set":5,"question":"初めて所持する銃の選定に迷ったときは、射撃指導員等の意見を参考にすると良い。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、 ":"銃砲店に猟銃を引き渡して所持許可の銃の数が0になった場合、所持許可証と併せて火薬類の譲受許可証も引き渡さなければならない。","answer":false,"explanation":"銃砲店に銃を引き渡して所持許可の数が0になった場合、所持許可証は銃砲店に引き渡します。ただし、火薬類の譲受許可証は自身で警察署に返納します。","references":["第1編 銃砲及び空気銃の所持に関する法令","第2節 猟銃用火薬類等譲受許可証"]},{"id":50,"set":5,"question":"猟場で竹やぶや石垣等に向けて発射すると、跳弾が発生して危険である。","answer":true,"explanation":"","references":["第2編 銃砲及び空気銃の使用、保管等の取扱い","第2編 銃砲・空気銃の使用、保管等についての事例","第1章 銃砲・空気銃の基本的取扱い"]}];
</script>
<script>
// State
let currentQuestions = [];
let currentIndex = 0;
let correctAnswers = 0;
let wrongAnswers = 0;
let wrongList = [];
let shuffleMode = true;
let wrongOnlyMode = false;

// Progress stored in localStorage
function getProgress() {
  try {
    return JSON.parse(localStorage.getItem('gun_exam_progress') || '{}');
  } catch { return {}; }
}
function saveProgress(key, value) {
  const p = getProgress();
  p[key] = value;
  localStorage.setItem('gun_exam_progress', JSON.stringify(p));
}
function getWrongHistory() {
  try {
    return JSON.parse(localStorage.getItem('gun_exam_wrong') || '[]');
  } catch { return []; }
}
function addWrongHistory(q) {
  const hist = getWrongHistory();
  const key = q.set + '-' + q.id;
  if (!hist.includes(key)) {
    hist.push(key);
    localStorage.setItem('gun_exam_wrong', JSON.stringify(hist));
  }
}
function removeWrongHistory(q) {
  let hist = getWrongHistory();
  const key = q.set + '-' + q.id;
  hist = hist.filter(h => h !== key);
  localStorage.setItem('gun_exam_wrong', JSON.stringify(hist));
}
function getTotalAnswered() {
  try {
    return JSON.parse(localStorage.getItem('gun_exam_answered') || '{}');
  } catch { return {}; }
}
function markAnswered(q, isCorrect) {
  const a = getTotalAnswered();
  const key = q.set + '-' + q.id;
  a[key] = isCorrect;
  localStorage.setItem('gun_exam_answered', JSON.stringify(a));
  if (isCorrect) {
    removeWrongHistory(q);
  } else {
    addWrongHistory(q);
  }
}

// Stats
function updateStats() {
  const answered = getTotalAnswered();
  const total = Object.keys(answered).length;
  const correct = Object.values(answered).filter(v => v).length;
  const wrong = getWrongHistory().length;
  const rate = total > 0 ? Math.round((correct / total) * 100) : 0;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">回答済み</div></div>
    <div class="stat-card"><div class="num">${rate}%</div><div class="label">正答率</div></div>
    <div class="stat-card"><div class="num">${wrong}</div><div class="label">要復習</div></div>
  `;
}

// Toggle modes
function toggleShuffle() {
  shuffleMode = !shuffleMode;
  document.getElementById('toggleShuffle').classList.toggle('active', shuffleMode);
}
function toggleWrongOnly() {
  wrongOnlyMode = !wrongOnlyMode;
  document.getElementById('toggleWrongOnly').classList.toggle('active', wrongOnlyMode);
}

// Shuffle array
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Start quiz
function startQuiz(setNum) {
  let questions;
  if (setNum === 0) {
    questions = [...ALL_QUESTIONS];
  } else {
    questions = ALL_QUESTIONS.filter(q => q.set === setNum);
  }

  if (wrongOnlyMode) {
    const hist = getWrongHistory();
    questions = questions.filter(q => hist.includes(q.set + '-' + q.id));
    if (questions.length === 0) {
      alert('間違えた問題がありません。通常モードで学習してください。');
      return;
    }
  }

  currentQuestions = shuffleMode ? shuffle(questions) : questions;
  currentIndex = 0;
  correctAnswers = 0;
  wrongAnswers = 0;
  wrongList = [];

  showScreen('quizScreen');
  showQuestion();
}

// Show question
function showQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('progressText').textContent =
    `${currentIndex + 1} / ${currentQuestions.length}`;
  document.getElementById('correctCount').textContent = correctAnswers;
  document.getElementById('wrongCount').textContent = wrongAnswers;
  document.getElementById('progressFill').style.width =
    `${((currentIndex) / currentQuestions.length) * 100}%`;

  document.getElementById('questionMeta').innerHTML =
    `<span class="tag">第${q.set}回 問${q.id}</span>`;
  document.getElementById('questionText').textContent = q.question;

  // Reset state
  document.getElementById('feedback').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => { b.classList.remove('disabled'); b.style.opacity = ''; });
}

// Submit answer
function submitAnswer(userAnswer) {
  const q = currentQuestions[currentIndex];
  const isCorrect = userAnswer === q.answer;

  markAnswered(q, isCorrect);

  if (isCorrect) {
    correctAnswers++;
  } else {
    wrongAnswers++;
    wrongList.push(q);
  }

  document.getElementById('correctCount').textContent = correctAnswers;
  document.getElementById('wrongCount').textContent = wrongAnswers;

  // Disable buttons
  document.querySelectorAll('.answer-btn').forEach(b => b.classList.add('disabled'));

  // Show feedback
  const fb = document.getElementById('feedback');
  fb.classList.remove('hidden', 'correct', 'wrong');
  fb.classList.add(isCorrect ? 'correct' : 'wrong');

  document.getElementById('feedbackTitle').textContent =
    isCorrect ? '正解!' : '不正解...';
  document.getElementById('feedbackAnswer').textContent =
    `正答: ${q.answer ? '○' : '×'}`;

  const explEl = document.getElementById('feedbackExplanation');
  explEl.textContent = q.explanation || '';

  const refsEl = document.getElementById('feedbackRefs');
  if (q.references && q.references.length > 0) {
    refsEl.textContent = '参照: ' + q.references.join(' / ');
  } else {
    refsEl.textContent = '';
  }

  document.getElementById('nextBtn').classList.remove('hidden');

  // Scroll to feedback
  setTimeout(() => fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

// Next question
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    showQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// Show result
function showResult() {
  showScreen('resultScreen');
  const total = currentQuestions.length;
  const pct = Math.round((correctAnswers / total) * 100);
  document.getElementById('resultScore').innerHTML = `${pct}<span class="unit">%</span>`;
  document.getElementById('resultLabel').textContent =
    `${total}問中 ${correctAnswers}問正解`;
  document.getElementById('resultCorrect').textContent = correctAnswers;
  document.getElementById('resultWrong').textContent = wrongAnswers;

  if (pct >= 90) {
    document.getElementById('resultLabel').textContent += ' - 素晴らしい!';
  } else if (pct >= 70) {
    document.getElementById('resultLabel').textContent += ' - もう少し!';
  }

  // Hide retry button if no wrong answers
  document.getElementById('retryWrongBtn').classList.toggle('hidden', wrongList.length === 0);

  // Show wrong answers review
  const list = document.getElementById('wrongReviewList');
  if (wrongList.length > 0) {
    list.innerHTML = '<div class="menu-section-title">間違えた問題</div>' +
      wrongList.map(q => `
        <div class="wrong-item">
          <div class="question-meta"><span class="tag">第${q.set}回 問${q.id}</span></div>
          <div class="q-text">${q.question}</div>
          <div class="correct-answer">正答: ${q.answer ? '○' : '×'}</div>
          ${q.explanation ? `<div class="expl">${q.explanation}</div>` : ''}
        </div>
      `).join('');
  } else {
    list.innerHTML = '';
  }

  updateStats();
}

// Retry wrong
function retryWrong() {
  if (wrongList.length === 0) return;
  currentQuestions = shuffleMode ? shuffle([...wrongList]) : [...wrongList];
  currentIndex = 0;
  correctAnswers = 0;
  wrongAnswers = 0;
  wrongList = [];
  showScreen('quizScreen');
  showQuestion();
}

// Navigation
function showScreen(id) {
  ['menuScreen', 'quizScreen', 'resultScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
function backToMenu() {
  showScreen('menuScreen');
  updateStats();
  window.scrollTo({ top: 0 });
}

// Reset progress
function resetProgress() {
  if (confirm('学習記録をすべてリセットしますか?')) {
    localStorage.removeItem('gun_exam_progress');
    localStorage.removeItem('gun_exam_wrong');
    localStorage.removeItem('gun_exam_answered');
    updateStats();
  }
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (document.getElementById('quizScreen').classList.contains('hidden')) return;
  if (e.key === 'o' || e.key === 'O' || e.key === '1') {
    if (!document.querySelector('.answer-btn').classList.contains('disabled')) {
      submitAnswer(true);
    }
  } else if (e.key === 'x' || e.key === 'X' || e.key === '2') {
    if (!document.querySelector('.answer-btn').classList.contains('disabled')) {
      submitAnswer(false);
    }
  } else if (e.key === 'Enter' || e.key === ' ') {
    if (!document.getElementById('nextBtn').classList.contains('hidden')) {
      e.preventDefault();
      nextQuestion();
    }
  }
});

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// Init
updateStats();
</script>
</body>
</html>
